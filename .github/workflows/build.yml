name: Build

env:
    XcodeVersion: '26.3'

on:
  push:
    branches:
      - "main"
  pull_request:
    branches: 
      - "*"

jobs:
  Build:
    runs-on: macos-15
    steps:
    - uses: actions/checkout@v6

    # Install .NET SDK
    - name: Setup .NET 10.0.x
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.x' # Adjust to your required .NET SDK version

    - name: Install .NET MAUI
      run: |
        dotnet workload install maui
        dotnet workload update

    - name: Install Xcode
      if: runner.os == 'macOS'
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: ${{ env.XcodeVersion }}

    - name: Display .NET Info
      run: 'dotnet --info'

    - name: Build Unit Tests
      run: dotnet build "./src/AiChatClient.UnitTests" -c Release

    - name: Build Console App
      run: dotnet build "./src/AiChatClient.Console" -c Release

    - name: Build Android MAUI App
      run: dotnet build "./src/AiChatClient.Maui" -f net10.0-android
